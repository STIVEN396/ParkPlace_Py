<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - ParkPlace</title>


<style>
body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    width:400px;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
    background:white;
}

.title{
    text-align:center;
    margin-bottom:20px;
}
</style>

</head>
<body>

<div class="login-card">

<h3 class="title">ParkPlace Login</h3>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">
Login
</button>
</div>

</form>

</div>

</body>
</html>
