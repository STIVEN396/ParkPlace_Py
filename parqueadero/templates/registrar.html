<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Vehículo</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#ffc107;
            border:none;
            border-radius:5px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#e0a800;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Registrar Ingreso</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Placa</label>
        <input type="text" name="placa" required>

<label>Tipo de vehículo</label>
<select name="tipo_vehiculo">
    <option value="Carro">Carro</option>
    <option value="Moto">Moto</option>
    <option value="Camioneta">Camioneta</option>
</select>

        <label>Color</label>
        <input type="text" name="color">

        <button type="submit">
            Registrar Vehículo
        </button>

    </form>

</div>

</body>
</html>
