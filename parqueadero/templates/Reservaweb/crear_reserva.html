<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacer una Reserva - ParkPlace</title>

<style>

    body, html {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100%;
        background: #f3f4f6;
    }

    .hero-section {
        position: relative;
        width: 100%;
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&q=80&w=1600') no-repeat center center;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        overflow: hidden;
    }

    .hero-section::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.6);
        z-index: 1;
    }

    .hero-content {
        position: relative;
        z-index: 2;
    }

    .hero-content h1 {
        font-size: 3.5rem;
        margin-bottom: 1rem;
        font-weight: 800;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    /* --- Mensaje de Éxito --- */
    .alert-success {
        background-color: #d1fae5;
        color: #065f46;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid #34d399;
        font-weight: bold;
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reserve {
        background-color: #3b82f6;
        color: white;
        padding: 18px 50px;
        font-size: 1.3rem;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    .btn-reserve:hover {
        background-color: #2563eb;
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }

    /* --- Modal --- */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0; top: 0;
        width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
    }

    .modal-content {
        background-color: white;
        margin: 5% auto;
        padding: 30px;
        border-radius: 20px;
        width: 90%;
        max-width: 450px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideDown {
        from { transform: translateY(-100px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 6px; color: #374151; font-weight: 600; font-size: 0.9rem; }
    .form-group input, .form-group select {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #e5e7eb;
        border-radius: 10px;
        box-sizing: border-box;
        transition: border-color 0.3s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #3b82f6;
    }

    .btn-submit {
        width: 100%;
        background-color: #10b981;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: background 0.3s;
    }

    .btn-submit:hover { background-color: #059669; }
</style>
</head>
<body>

<div class="hero-section">
    <div class="hero-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert-success">
                    <i class="fas fa-check-circle"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <h1>Asegura tu lugar hoy</h1>
        <p>Evita vueltas innecesarias. Reserva tu espacio de parqueo en segundos y llega directo a tu destino.</p>
        <button class="btn-reserve" onclick="openModal()">¡Reserva aquí!</button>
    </div>
</div>

<div id="reservaModal" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="margin: 0; color: #111827; font-size: 1.5rem;">Nueva Reserva</h2>
            <span style="cursor:pointer; font-size: 28px; color: #9ca3af;" onclick="closeModal()">&times;</span>
        </div>

        <form method="POST" action="{% url 'crear_reserva' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>
            <div class="form-group">
                <label>Cédula</label>
                <input type="text" name="cedula" placeholder="Documento de identidad" required>
            </div>
            <div class="form-group">
                <label>Placa del Vehículo</label>
                <input type="text" name="placa" placeholder="ABC-123" required style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label>Tipo de Vehículo</label>
                <select name="tipo_vehiculo">
                    <option value="Auto">Automóvil</option>
                    <option value="Moto">Motocicleta</option>
                    <option value="Camioneta">Camioneta</option>
                </select>
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Fecha</label>
                    <input type="date" name="fecha" id="fechaField" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Hora</label>
                    <input type="time" name="hora" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Confirmar Reserva</button>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById("reservaModal");

    function openModal() { 
        modal.style.display = "block"; 
// fecha
        document.getElementById('fechaField').valueAsDate = new Date();
    }
    
    function closeModal() { modal.style.display = "none"; }

    window.onclick = function(event) {
        if (event.target == modal) { closeModal(); }
    }
</script>

</body>
</html>
