<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ParkPlace Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.navbar{
background:#020617;
}

.sidebar{
height:100vh;
background:#020617;
padding:20px;
}

.sidebar h4{
color:#38bdf8;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
font-size:16px;
}

.sidebar a:hover{
color:#38bdf8;
}

.card{
background:#020617;
border:1px solid #38bdf8;
color:white;
border-radius:12px;
}

.card h3{
color:#38bdf8;
}

.table{
background:#020617;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid">
<span class="navbar-brand">🚗 ParkPlace Dashboard</span>
<a href="/accounts/logout/" class="btn btn-outline-info">Logout</a>
</div>
</nav>

<div class="container-fluid">
<div class="row">

<div class="col-md-2 sidebar">

<h4>Menu</h4>

<a href="/dashboard/">Dashboard</a>
<a href="/registrar/">Registrar Vehículo</a>
<a href="#">Vehículos dentro</a>
<a href="#">Reportes</a>

</div>

<div class="col-md-10 p-4">

<h2 class="mb-4" style="color:#38bdf8;">Dashboard</h2>

<div class="row">

<div class="col-md-4">
<div class="card p-3">
<h6>Vehículos dentro</h6>
<h3>15</h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">

<h3>35</h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h6>Ingresos hoy</h6>
<h3>22</h3>
</div>
</div>

</div>

<div class="mt-5">

<h4 style="color:#38bdf8;">Actividad reciente</h4>

<table class="table table-dark table-striped">

<thead>
<tr>
<th>Placa</th>
<th>Tipo</th>
<th>Hora ingreso</th>
</tr>
</thead>

<tbody>

<tr>
<td>ABC123</td>
<td>Carro</td>
<td>10:15</td>
</tr>

<tr>
<td>XYZ987</td>
<td>Moto</td>
<td>11:30</td>
</tr>

<tr>
<td>JKL456</td>
<td>Carro</td>
<td>12:05</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>
</div>

</html>
