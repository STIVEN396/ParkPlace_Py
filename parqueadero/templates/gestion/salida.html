<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Salida</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f4f6f9;
}

.sidebar{
width:260px;
background:#0d1b2a;
color:white;
height:100vh;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.sidebar a:hover{
background:#1b263b;
}

.content{
flex:1;
padding:40px;
}

form{
background:white;
padding:30px;
width:350px;
border-radius:8px;
box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#1b263b;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0d1b2a;
}

.resultado{
margin-top:30px;
background:white;
padding:20px;
width:350px;
border-radius:8px;
box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

h1{
color:#0d1b2a;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>ParkPlace</h2>

<a href="/dashboard/">Dashboard</a>
<a href="/registrar/">Ingreso</a>
<a href="/salida/">Salida</a>
<a href="/historial/">Historial</a>
<a href="/reportes/">Reportes</a>
<a href="/configuracion/">Configuración</a>

</div>


<div class="content">

<h1>Registrar salida de vehículo</h1>

<form method="POST">

{% csrf_token %}

<input type="text" name="placa" placeholder="Placa del vehículo" required>

<button type="submit">Registrar salida</button>

</form>


{% if total %}

<div class="resultado">

<h2>Total a pagar</h2>

<p><b>Placa:</b> {{ placa }}</p>

<p><b>Tiempo estacionado:</b> {{ tiempo }} horas</p>

<p><b>Valor a pagar:</b> $ {{ total }}</p>

</div>

{% endif %}

</div>

</body>
</html>
