<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>ParkPlace</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Arial;
}

.sidebar{
width:240px;
height:100vh;
background:white;
border-right:1px solid #ddd;
position:fixed;
}

.sidebar h3{
padding:20px;
color:#5b5bd6;
}

.sidebar a{
display:block;
padding:12px 20px;
text-decoration:none;
color:#444;
font-weight:500;
}

.sidebar a:hover{
background:#6c63ff;
color:white;
border-radius:8px;
margin:5px;
}

.topbar{
height:70px;
background:white;
border-bottom:1px solid #ddd;
padding:15px;
margin-left:240px;
}

.content{
margin-left:240px;
padding:30px;
}

.card-stat{
border:none;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.parking-slot{
width:80px;
height:80px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin:8px;
}

.disponible{
background:#c8f7dc;
border:2px solid #2ecc71;
}

.ocupado{
background:#ffd6d6;
border:2px solid #ff4d4d;
}

.reservado{
background:#fff3cd;
border:2px solid #ffc107;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>🚗 ParkPlace</h3>

<a href="{% url 'dashboard' %}">Dashboard</a>
<a href="{% url 'registrar' %}">Registrar vehículo</a>
<a href="{% url 'vehiculos' %}">Vehículos dentro</a>
<a href="{% url 'historial' %}">Historial</a>
<a href="{% url 'reportes' %}">Reportes</a>
<a href="{% url 'configuracion' %}">Configuración</a>

<hr>

<a href="{% url 'mod7' %}">Módulo 7</a>
<a href="{% url 'mod8' %}">Módulo 8</a>
<a href="{% url 'mod9' %}">Módulo 9</a>
<a href="{% url 'mod10' %}">Módulo 10</a>

</div>

<!-- TOPBAR -->

<div class="topbar">

<input class="form-control w-50 d-inline"
placeholder="Buscar vehículos, placas...">

</div>

<!-- CONTENIDO -->

<div class="content">

{% block content %}

{% endblock %}

</div>

</body>
</html>
