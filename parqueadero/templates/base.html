<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>{% block title %}ParkPlace{% endblock %}</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f7fb;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#0f172a;
    color:white;
}

.sidebar h2{
    text-align:center;
    padding:25px;
    border-bottom:1px solid #1e293b;
    font-size:22px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px 25px;
    text-decoration:none;
    font-size:16px;
}

.sidebar a:hover{
    background:#1e3a8a;
}

/* CONTENIDO */

.content{
    margin-left:260px;
    padding:40px;
}

/* TARJETAS */

.card{
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

</style>

{% block extra_css %}{% endblock %}

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>ParkPlace</h2>

<a href="/dashboard/">Dashboard</a>
<a href="/registrar/">Ingreso</a>
<a href="/salida/">Salida</a>
<a href="/historial/">Historial</a>
<a href="/reservas/">Reservas</a>
<a href="/espacios/">Gestión de espacios</a>
<a href="/tarifas/">Tarifas</a>
<a href="/usuarios/">Usuarios</a>
<a href="/reportes/">Reportes</a>
<a href="/configuracion/">Configuración</a>

</div>

<!-- CONTENIDO -->

<div class="content">

{% block content %}
{% endblock %}

</div>

</body>
</html>
